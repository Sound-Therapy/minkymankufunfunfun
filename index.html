<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McKayla's Poop Roadmap v1.1.2 💩</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            background-color: #fff5f7; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        .app-container { 
            width: 90%; 
            max-width: 400px; 
            background: white; 
            padding: 40px 20px; 
            border-radius: 40px; 
            box-shadow: 0 20px 40px rgba(255, 149, 180, 0.15); 
            text-align: center; 
            margin-top: 20px;
        }
        .header { color: #ff748d; font-size: 0.9rem; letter-spacing: 1px; margin-bottom: 10px; font-weight: 700; text-transform: uppercase; }
        .score-label { font-size: 1.2rem; color: #8d766b; font-weight: 500; }
        .score-value { 
            font-size: 5.5rem; 
            font-weight: 900; 
            color: #8b5e3c; 
            margin: 10px 0; 
            line-height: 1;
        }
        .btn { 
            width: 100%; 
            padding: 20px; 
            margin: 12px 0; 
            border: none; 
            border-radius: 20px; 
            font-size: 1.1rem; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.2s;
        }
        .btn:active { transform: scale(0.96); }
        .btn-poop { 
            background: linear-gradient(135deg, #ff748d, #ff9cae); 
            color: white; 
            box-shadow: 0 10px 20px rgba(255, 116, 141, 0.3); 
        }
        .btn-history { background-color: #fcfcfc; color: #ff748d; border: 2px solid #ffedf1; }
        .chart-container { 
            width: 90%; 
            max-width: 400px; 
            background: white; 
            padding: 20px; 
            border-radius: 30px; 
            display: none; 
            margin-top: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.4); 
            justify-content: center; 
            align-items: center; 
            z-index: 100; 
            backdrop-filter: blur(8px); 
        }
        .modal-content { 
            background: white; 
            padding: 40px 25px; 
            border-radius: 35px; 
            width: 80%; 
            max-width: 300px; 
            text-align: center;
        }
        #modal-title { font-size: 1.4rem; margin-bottom: 15px; color: #ff748d; }
        #question-display { font-size: 1.1rem; color: #555; margin-bottom: 30px; line-height: 1.5; min-height: 3.5rem; display: flex; align-items: center; justify-content: center; }
        .choice-btn-group { display: flex; gap: 10px; }
        .choice-btn { flex: 1; padding: 18px; border: none; border-radius: 18px; font-size: 1rem; font-weight: 700; cursor: pointer; }
        .btn-yes { background: #ff748d; color: white; }
        .btn-no { background: #f1f3f5; color: #868e96; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">Daily Growth Tracker</div>
    <div class="score-label">McKayla's Poop Points 💩</div>
    <div id="poop-score" class="score-value">0</div>
    
    <button class="btn btn-poop" onclick="startMission()">Collect Points</button>
    <button class="btn btn-history" onclick="toggleHistory()">Growth Graph 📈</button>

    <div id="history-section" class="chart-container">
        <canvas id="growthChart"></canvas>
    </div>
</div>

<div id="missionModal" class="modal">
    <div class="modal-content">
        <h2 id="modal-title"></h2>
        <p id="question-display"></p>
        <div class="choice-btn-group">
            <button class="choice-btn btn-yes" onclick="handleChoice(true)">Yes! 🎉</button>
            <button class="choice-btn btn-no" onclick="handleChoice(false)">Not yet</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAoLonGkvQrPpNk5Rl8vJvR-eNg63xUPO4",
        authDomain: "road-to-the-victory-mason.firebaseapp.com",
        projectId: "road-to-the-victory-mason",
        storageBucket: "road-to-the-victory-mason.firebasestorage.app",
        messagingSenderId: "501843531403",
        appId: "1:501843531403:web:da9adcba51b12ad057e68e",
        databaseURL: "https://road-to-the-victory-mason-default-rtdb.firebaseio.com/"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let state = {
        score: 100,
        didCheckIn: false,
        lastUpdateDay: new Date().toDateString(),
        history: [{date: new Date().toLocaleDateString('en-US', {month:'short', day:'numeric'}), score: 100}]
    };

    let chartInstance = null;
    let currentStep = 1;
    let sessionPoints = 0;

    // 질문 목록 수정
    const questions = [
        { title: "Algebra 1 ✏️", q: "Did you finish your Khan Academy Algebra 1 today?" },
        { title: "Reading! 📚", q: "Did you finish your Khan Academy 7th grade Reading & Vocab?" },
        { title: "Move it! 💃", q: "Did you do your fun exercise today?" }
    ];

    function loadData() {
        db.ref('mckayla_data').once('value').then((snapshot) => {
            if (snapshot.exists()) {
                state = snapshot.val();
                checkDailyGap();
            } else {
                saveData();
            }
            updateUI();
        });
    }

    function checkDailyGap() {
        const todayStr = new Date().toDateString();
        if (todayStr !== state.lastUpdateDay) {
            const lastDate = new Date(state.lastUpdateDay);
            const diffDays = Math.ceil(Math.abs(new Date(todayStr) - lastDate) / (1000 * 60 * 60 * 24));
            if (diffDays >= 1) {
                let penaltyStart = state.didCheckIn ? 1 : 0;
                for(let i = penaltyStart; i < diffDays; i++) {
                    state.score -= 30;
                    let mDate = new Date(lastDate); mDate.setDate(lastDate.getDate() + i + 1);
                    state.history.push({ date: mDate.toLocaleDateString('en-US', {month:'short', day:'numeric'}), score: state.score });
                }
            }
            state.lastUpdateDay = todayStr;
            state.didCheckIn = false;
            saveData();
        }
    }

    function saveData() {
        db.ref('mckayla_data').set(state);
    }

    function startMission() {
        if (state.didCheckIn) return alert("All done for today! ✨");
        currentStep = 0; sessionPoints = 0;
        showQuestion();
        document.getElementById('missionModal').style.display = 'flex';
    }

    function showQuestion() {
        document.getElementById('modal-title').innerText = questions[currentStep].title;
        document.getElementById('question-display').innerText = questions[currentStep].q;
    }

    function handleChoice(isYes) {
        if (isYes) sessionPoints += 10;
        else sessionPoints -= 10;
        
        // 마지막 질문인지 체크하는 로직 보강
        if (currentStep < questions.length - 1) {
            currentStep++;
            showQuestion();
        } else {
            finishSession();
        }
    }

    function finishSession() {
        state.score += sessionPoints;
        state.didCheckIn = true;
        state.history.push({ date: new Date().toLocaleDateString('en-US', {month:'short', day:'numeric'}), score: state.score });
        saveData();
        updateUI();
        document.getElementById('missionModal').style.display = 'none';
        
        let msg = sessionPoints >= 0 ? "Yay! +" + sessionPoints + " points! 💩" : "Oh no! " + sessionPoints + " points... 🥺";
        alert(msg);
        if(chartInstance) initChart();
    }

    function toggleHistory() {
        const s = document.getElementById('history-section');
        s.style.display = (s.style.display === 'block') ? 'none' : 'block';
        if (s.style.display === 'block') initChart();
    }

    function initChart() {
        const ctx = document.getElementById('growthChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: state.history.map(h => h.date),
                datasets: [{ 
                    label: 'Poop Points', 
                    data: state.history.map(h => h.score), 
                    borderColor: '#ff748d', 
                    backgroundColor: 'rgba(255, 116, 141, 0.1)',
                    fill: true,
                    tension: 0.4,
                    borderWidth: 3,
                    pointRadius: 4,
                    pointBackgroundColor: '#ff748d'
                }]
            },
            options: { 
                responsive: true,
                scales: { 
                    y: { grid: { color: '#f8f9fa' } },
                    x: { grid: { display: false } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    function updateUI() {
        document.getElementById('poop-score').innerText = state.score;
    }

    window.onload = loadData;
</script>
</body>
</html>
