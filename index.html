<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McKayla's Poop Roadmap 💩</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background-color: #fff0f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .app-container { width: 100%; max-width: 400px; background: white; padding: 30px; border-radius: 40px; box-shadow: 0 10px 25px rgba(255,105,180,0.2); text-align: center; border: 4px solid #ffdeeb; }
        .header { color: #ff85a2; font-size: 1.2rem; margin-bottom: 10px; font-weight: bold; }
        .score-label { font-size: 1.5rem; color: #6b4e3d; }
        .score-value { font-size: 6rem; font-weight: 900; color: #a67c52; margin: 10px 0; text-shadow: 3px 3px #fce4ec; }
        .poop-emoji { font-size: 3rem; }
        .btn { width: 100%; padding: 20px; margin: 10px 0; border: none; border-radius: 25px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; transform: scale(1); }
        .btn:active { transform: scale(0.95); }
        .btn-poop { background: linear-gradient(135deg, #ff85a2, #ffb3c6); color: white; box-shadow: 0 5px 15px rgba(255,133,162,0.4); }
        .btn-history { background-color: #f0f4f8; color: #888; font-size: 0.9rem; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 30px; border-radius: 35px; width: 85%; max-width: 320px; text-align: center; border: 5px solid #ff85a2; }
        .choice-btn { width: 45%; padding: 15px; border: none; border-radius: 20px; background: #ffe0e9; cursor: pointer; font-size: 1.1rem; font-weight: bold; color: #ff5c8a; }
        .choice-btn:hover { background: #ff85a2; color: white; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">✨ McKayla's Daily Mission ✨</div>
    <div class="score-label">My Poop Points <span class="poop-emoji">💩</span></div>
    <div id="poop-score" class="score-value">0</div>
    
    <button class="btn btn-poop" onclick="startMission()">Collect Poop Points!</button>
    <button class="btn btn-history" onclick="alert('Coming soon! Happy collecting!')">View My Growth</button>
</div>

<div id="missionModal" class="modal">
    <div class="modal-content">
        <h2 id="modal-title" style="color: #ff5c8a;">Math Time! ✏️</h2>
        <p id="question-display" style="font-size: 1.2rem; color: #555; min-height: 60px;"></p>
        <div style="display: flex; justify-content: space-around; margin-top: 20px;">
            <button class="choice-btn" onclick="handleChoice(true)">Yes! 🎉</button>
            <button class="choice-btn" onclick="handleChoice(false)">Not yet</button>
        </div>
    </div>
</div>

<script>
    // --- 아버님의 Firebase 정보를 그대로 사용합니다 ---
    const firebaseConfig = {
        apiKey: "AIzaSyAoLonGkvQrPpNk5Rl8vJvR-eNg63xUPO4",
        authDomain: "road-to-the-victory-mason.firebaseapp.com",
        projectId: "road-to-the-victory-mason",
        storageBucket: "road-to-the-victory-mason.firebasestorage.app",
        messagingSenderId: "501843531403",
        appId: "1:501843531403:web:da9adcba51b12ad057e68e",
        databaseURL: "https://road-to-the-victory-mason-default-rtdb.firebaseio.com/"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let state = {
        score: 0,
        didCheckIn: false,
        lastUpdate: ""
    };

    let currentStep = 1;
    let earnedThisSession = 0;

    const questions = {
        1: "Did you finish your Khan Academy Algebra today? 🔢",
        2: "Did you read and do your ELA practice? 📖",
        3: "Did you do your fun exercise today? 💃"
    };

    function loadData() {
        db.ref('mckayla_data').once('value').then((snapshot) => {
            if (snapshot.exists()) {
                state = snapshot.val();
                // 날짜가 바뀌었는지 체크
                const today = new Date().toDateString();
                if(state.lastUpdate !== today) {
                    state.didCheckIn = false;
                    state.lastUpdate = today;
                    saveData();
                }
            }
            updateUI();
        });
    }

    function saveData() {
        db.ref('mckayla_data').set(state);
    }

    function startMission() {
        if (state.didCheckIn) return alert("You already got your poop points today! See you tomorrow! ✨");
        currentStep = 1; earnedThisSession = 0;
        showQuestion();
        document.getElementById('missionModal').style.display = 'flex';
    }

    function showQuestion() {
        let title = "Math Time! ✏️";
        if (currentStep === 2) title = "Reading! 📚";
        if (currentStep === 3) title = "Move it! 🏃‍♀️";
        document.getElementById('modal-title').innerText = title;
        document.getElementById('question-display').innerText = questions[currentStep];
    }

    function handleChoice(isYes) {
        if (isYes) earnedThisSession += 10; // 항목당 10점씩!
        currentStep++;
        if (currentStep > 3) finish();
        else showQuestion();
    }

    function finish() {
        state.score += earnedThisSession;
        state.didCheckIn = true;
        saveData();
        updateUI();
        document.getElementById('missionModal').style.display = 'none';
        alert("Yay! You earned " + earnedThisSession + " Poop Points! 💩✨");
    }

    function updateUI() {
        document.getElementById('poop-score').innerText = state.score;
    }

    window.onload = loadData;
</script>
</body>
</html>
