<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McKayla's Poop Roadmap v1.1.5 💩</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #fff5f7; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .app-container { width: 90%; max-width: 400px; background: white; padding: 40px 20px; border-radius: 40px; box-shadow: 0 20px 40px rgba(255,149,180,0.15); text-align: center; margin-top: 20px; }
        .score-value { font-size: 5.5rem; font-weight: 900; color: #8b5e3c; margin: 10px 0; }
        .btn { width: 100%; padding: 20px; margin: 12px 0; border: none; border-radius: 20px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .btn-poop { background: linear-gradient(135deg, #ff748d, #ff9cae); color: white; }
        .btn-history { background-color: #fcfcfc; color: #ff748d; border: 2px solid #ffedf1; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 40px 25px; border-radius: 35px; width: 80%; max-width: 300px; text-align: center; }
        .choice-btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .choice-btn { flex: 1; padding: 18px; border: none; border-radius: 18px; font-size: 1rem; font-weight: 700; cursor: pointer; }
        .btn-yes { background: #ff748d; color: white; }
        .btn-no { background: #f1f3f5; color: #868e96; }
        .version-info { font-size: 0.7rem; color: #ddd; margin-top: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <div style="color: #ff748d; font-weight: 700; text-transform: uppercase;">Daily Tracker</div>
    <div style="font-size: 1.2rem; color: #8d766b;">McKayla's Poop Points 💩</div>
    <div id="poop-score" class="score-value">--</div>
    
    <button class="btn btn-poop" onclick="startMission()">Collect Poop</button>
    <button class="btn btn-history" onclick="toggleHistory()">Growth Graph 📈</button>
    
    <div id="history-section" style="display:none; margin-top:20px; width:100%;">
        <canvas id="growthChart"></canvas>
    </div>
    <div class="version-info">v1.1.5 | Fixed Final Step Bug</div>
</div>

<div id="missionModal" class="modal">
    <div class="modal-content">
        <h2 id="modal-title" style="color:#ff748d;"></h2>
        <p id="question-display" style="font-size:1.1rem; color:#555; margin-bottom:20px;"></p>
        <div class="choice-btn-group">
            <button class="choice-btn btn-yes" onclick="processAnswer(true)">Yes! 🎉</button>
            <button class="choice-btn btn-no" onclick="processAnswer(false)">Not yet</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAoLonGkvQrPpNk5Rl8vJvR-eNg63xUPO4",
        authDomain: "road-to-the-victory-mason.firebaseapp.com",
        projectId: "road-to-the-victory-mason",
        storageBucket: "road-to-the-victory-mason.firebasestorage.app",
        messagingSenderId: "501843531403",
        appId: "1:501843531403:web:da9adcba51b12ad057e68e",
        databaseURL: "https://road-to-the-victory-mason-default-rtdb.firebaseio.com/"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let state = { score: 100, didCheckIn: false, lastUpdateDay: new Date().toDateString(), history: [] };
    const questions = [
        { title: "Algebra 1 ✏️", q: "Did you finish your khan academy algebra 1 today?" },
        { title: "Reading! 📚", q: "Did you finish your khan academy 7th grade reading and vocab?" },
        { title: "Move it! 💃", q: "Did you do your fun exercise today?" }
    ];
    let currentIdx = 0;
    let sessionPoints = 0;
    let chartInstance = null;

    function loadData() {
        db.ref('mckayla_data').on('value', (snapshot) => {
            if (snapshot.exists()) { state = snapshot.val(); checkDailyGap(); }
            document.getElementById('poop-score').innerText = state.score;
        });
    }

    function checkDailyGap() {
        const today = new Date().toDateString();
        if (today !== state.lastUpdateDay) {
            const lastDate = new Date(state.lastUpdateDay);
            const diffDays = Math.ceil(Math.abs(new Date(today) - lastDate) / (1000 * 60 * 60 * 24));
            if (diffDays >= 1) {
                for(let i = (state.didCheckIn ? 1 : 0); i < diffDays; i++) {
                    state.score -= 30;
                    let mDate = new Date(lastDate); mDate.setDate(lastDate.getDate() + i + 1);
                    state.history.push({ date: mDate.toLocaleDateString('en-US', {month:'short', day:'numeric'}), score: state.score });
                }
            }
            state.lastUpdateDay = today; state.didCheckIn = false;
            db.ref('mckayla_data').set(state);
        }
    }

    function startMission() {
        if (state.didCheckIn) return alert("Already collected today! See you tomorrow! ✨");
        currentIdx = 0; sessionPoints = 0;
        updateModal();
        document.getElementById('missionModal').style.display = 'flex';
    }

    function updateModal() {
        document.getElementById('modal-title').innerText = questions[currentIdx].title;
        document.getElementById('question-display').innerText = questions[currentIdx].q;
    }

    function processAnswer(isYes) {
        if (isYes) sessionPoints += 10; else sessionPoints -= 10;
        currentIdx++;
        
        if (currentIdx < questions.length) {
            updateModal();
        } else {
            finishMission();
        }
    }

    function finishMission() {
        // 1. 즉시 화면 닫기
        document.getElementById('missionModal').style.display = 'none';
        
        // 2. 데이터 업데이트
        state.score += sessionPoints;
        state.didCheckIn = true;
        state.history.push({ 
            date: new Date().toLocaleDateString('en-US', {month:'short', day:'numeric'}), 
            score: state.score 
        });
        
        // 3. 서버 저장 및 알림
        db.ref('mckayla_data').set(state).then(() => {
            const msg = sessionPoints >= 0 ? `Yay! +${sessionPoints} points! 💩` : `Oh no! ${sessionPoints} points... 🥺`;
            alert(msg);
        });
    }

    function toggleHistory() {
        const s = document.getElementById('history-section');
        s.style.display = (s.style.display === 'none') ? 'block' : 'none';
        if (s.style.display === 'block') initChart();
    }

    function initChart() {
        const ctx = document.getElementById('growthChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: state.history.map(h => h.date),
                datasets: [{ label: 'Poop Points', data: state.history.map(h => h.score), borderColor: '#ff748d', tension: 0.4 }]
            }
        });
    }

    window.onload = loadData;
</script>
</body>
</html>
